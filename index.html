const SB_HDR={"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"Content-Type":"application/json","Prefer":"return=representation"};
async function sbGet(table,query=""){
  try{const r=await fetch(SB_URL+"/rest/v1/"+table+"?"+query,{headers:SB_HDR});return await r.json();}catch(e){return null;}
}
async function sbPost(table,body){
  try{const r=await fetch(SB_URL+"/rest/v1/"+table,{method:"POST",headers:SB_HDR,body:JSON.stringify(body)});return await r.json();}catch(e){return null;}
}
async function sbPatch(table,query,body){
  try{const r=await fetch(SB_URL+"/rest/v1/"+table+"?"+query,{method:"PATCH",headers:{...SB_HDR,Prefer:"return=representation"},body:JSON.stringify(body)});return await r.json();}catch(e){return null;}
}
// Ensure wallet exists for user, returns balance
async function getOrCreateWallet(phone){
  let rows=await sbGet("wallets","phone=eq."+encodeURIComponent(phone));
  if(!rows||rows.length===0){
    rows=await sbPost("wallets",{phone,balance:637480.25});
    return rows&&rows[0]?rows[0].balance:637480.25;
  }
  return rows[0].balance;
}
async function deductWallet(phone,amount){
  const bal=await getOrCreateWallet(phone);
  const newBal=Math.max(0,bal-parseFloat(amount));
  await sbPatch("wallets","phone=eq."+encodeURIComponent(phone),{balance:newBal});
  return newBal;
}
async function saveTransaction(txData){
  await sbPost("transactions",txData);
}

function LoginScreen({onLogin}){
  const [phone,setPhone]=useState("");
  const [step,setStep]=useState("phone");
  const [otp,setOtp]=useState("");
  const [loading,setLoading]=useState(false);
  const [failed,setFailed]=useState(0);
  const [locked,setLocked]=useState(false);
  const [lockSec,setLockSec]=useState(0);

  useEffect(()=>{setPhone("");setStep("phone");setOtp("");setLoading(false);setFailed(0);setLocked(false);},[]);

  function sendOtp(){if(phone.replace(/\s/g,"").length<9)return;setLoading(true);setTimeout(()=>{setLoading(false);setStep("otp");},1200);}
  function verifyOtp(){
    if(locked||otp.length<6)return;
    if(otp==="123456"){setFailed(0);setStep("bio");}
    else{
      const n=failed+1;setFailed(n);
      if(n>=3){setLocked(true);let t=30;setLockSec(t);const iv=setInterval(()=>{t--;setLockSec(t);if(t<=0){clearInterval(iv);setLocked(false);setFailed(0);setOtp("");}},1000);}
      else alert("Incorrect code! Attempts left: "+(3-n));
    }
  }
  function biometric(){setLoading(true);setTimeout(()=>{setLoading(false);onLogin();},1400);}

  if(locked)return(
    <div style={{minHeight:"100vh",background:GRAY,display:"flex",alignItems:"center",justifyContent:"center"}}>

        <div style={{color:RED,fontWeight:800,fontSize:18,marginTop:12}}>Account Locked</div>
        <div style={{fontSize:13,color:"#555",marginTop:6}}>Too many incorrect attempts</div>
        <div style={{fontSize:34,fontWeight:900,color:RED,marginTop:10}}>{lockSec}s</div>
      </div>
    </div>
  );

  return(
    <div style={{minHeight:"100vh",background:"#f0f5eb",display:"flex",flexDirection:"column",position:"relative",overflow:"hidden"}}>
      {/* wave bg */}
      <svg style={{position:"absolute",bottom:0,left:0,opacity:0.08,pointerEvents:"none"}} width="400" height="300" viewBox="0 0 400 300">

      </svg>

      <TopBar/>
      <div style={{textAlign:"right",padding:"8px 18px"}}>
        <span style={{fontSize:13,fontWeight:600,color:TEXT}}>English ▾</span>
      </div>

      <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"10px 24px 40px"}}>
        {step==="phone"&&<>
          <div style={{fontSize:20,fontWeight:800,color:BLUE,textAlign:"center",marginBottom:4}}>Welcome to telebirr SuperApp!</div>
          <div style={{fontSize:15,fontWeight:600,color:BLUE,marginBottom:28}}>All-in-One</div>
        </>}

        <div style={{width:"100%",background:"#fff",borderRadius:4,padding:"28px 20px",boxShadow:"0 2px 12px rgba(0,0,0,0.08)"}}>
          {step==="phone"&&<>
            <div style={{fontSize:26,fontWeight:900,textAlign:"center",color:TEXT,marginBottom:6}}>Login</div>
            <div style={{width:44,height:3,background:GREEN,borderRadius:2,margin:"0 auto 24px"}}/>
            <div style={{fontSize:13,color:"#888",marginBottom:6}}>Mobile Number</div>
            <div style={{display:"flex",alignItems:"center",background:"#f5f5f5",borderRadius:4,padding:"12px 14px",marginBottom:22,border:"1px solid #e0e0e0"}}>
              <span style={{fontWeight:700,color:TEXT,marginRight:10,fontSize:15}}>+251</span>
              <div style={{width:1,height:20,background:"#ccc",marginRight:10}}/>
              <input value={phone} onChange={e=>setPhone(e.target.value)} type="tel" placeholder="9XXXXXXXX"
                style={{border:"none",background:"transparent",flex:1,fontSize:16,color:TEXT,fontWeight:500}}/>
            </div>
            <button onClick={sendOtp} style={{width:"100%",padding:"14px",borderRadius:6,border:"none",background:BLUE,color:"#fff",fontSize:16,fontWeight:500,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:10}}>
              {loading?<><Spinner/> Sending...</>:"Next"}
            </button>
            <div style={{textAlign:"center",marginTop:18,fontSize:13,color:"#888"}}>
              Don't have an account?{" "}<span style={{color:GREEN,fontWeight:700}}>Create New Account</span>
            </div>
            <div style={{display:"flex",justifyContent:"center",gap:40,marginTop:14}}>
              <span style={{color:GREEN,fontWeight:700,fontSize:13}}>teleHub</span>
              <span style={{color:GREEN,fontWeight:700,fontSize:13}}>Help</span>
            </div>
          </>}

          {step==="otp"&&<>
            <button onClick={()=>setStep("phone")} style={{background:"none",border:"none",color:GREEN,fontWeight:700,cursor:"pointer",marginBottom:12,padding:0,fontSize:13}}>← Back</button>
            <div style={{fontSize:22,fontWeight:400,textAlign:"center",color:TEXT,marginBottom:4}}>Enter OTP</div>
            <div style={{width:40,height:3,background:GREEN,borderRadius:2,margin:"0 auto 16px"}}/>

              Code sent to +251{phone}<br/>

            </div>
            <input value={otp} onChange={e=>setOtp(e.target.value.slice(0,6))} type="number" placeholder="000000"
              style={{width:"100%",padding:"14px",borderRadius:4,border:"1px solid #ddd",fontSize:30,textAlign:"center",letterSpacing:8,marginBottom:18,color:TEXT,fontWeight:700}}/>
            <button onClick={verifyOtp} style={{width:"100%",padding:14,borderRadius:6,border:"none",background:otp.length===6?GREEN:"#ccc",color:"#fff",fontSize:16,fontWeight:500,cursor:"pointer"}}>Verify</button>
            <div style={{textAlign:"center",marginTop:14}}>
              <span style={{color:BLUE,fontSize:13}}>Didn't receive code? Resend</span>
            </div>
          </>}

          {step==="bio"&&<>
            <div style={{fontSize:22,fontWeight:400,textAlign:"center",color:TEXT,marginBottom:4}}>Verify Identity</div>
            <div style={{width:40,height:3,background:GREEN,borderRadius:2,margin:"0 auto 20px"}}/>
            <div style={{textAlign:"center",marginBottom:24}}>
              <div style={{width:88,height:88,borderRadius:"50%",background:"#e8f5e9",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 14px",border:`3px solid ${GREEN}`}}>
                <span style={{fontSize:46}}>👆</span>
              </div>
              <div style={{fontSize:14,color:"#555",fontWeight:600}}>Place your finger on the sensor</div>
              <div style={{fontSize:12,color:"#aaa",marginTop:4}}>or use Face ID</div>
            </div>
            <button onClick={biometric} style={{width:"100%",padding:14,borderRadius:6,border:"none",background:loading?"#aaa":GREEN,color:"#fff",fontSize:16,fontWeight:500,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:10}}>
              {loading?<><Spinner/> Verifying...</>:"👆 Fingerprint / Face ID"}
            </button>
          </>}
        </div>
      </div>

      <div style={{textAlign:"center",paddingBottom:20,fontSize:11,color:"#aaa"}}>
        <div style={{color:GREEN,marginBottom:4}}>Terms and Conditions</div>
        @2026 Ethio telecom. All rights reserved 1.2.9 version
      </div>
    </div>
  );
}

// ── SEND MONEY ────────────────────────────────────────
function SendScreen({onBack,onSuccess}){
  const [to,setTo]=useState("");
  const [amount,setAmount]=useState("");
  const [loading,setLoading]=useState(false);
  const [mode,setMode]=useState("send");
  function handle(){
    if(!to.trim()||!amount.trim()){alert("Please fill all fields");return;}
    if(mode==="request"){alert("Request of "+amount+" ETB sent to "+to);return;}
    setLoading(true);
    setTimeout(()=>{setLoading(false);onSuccess({to,amount,time:nowStr(),ref:txRef()});},1400);
  }
  return(
    <div style={{minHeight:"100vh",background:GRAY,display:"flex",flexDirection:"column"}}>
      <div style={{background:GREEN,padding:"14px 16px",display:"flex",alignItems:"center",gap:12}}>

        <span style={{color:"#fff",fontSize:17,fontWeight:700}}>Send Money</span>
      </div>
      <div style={{padding:16,flex:1}}>
        <div style={{background:"#fff",borderRadius:12,padding:20,boxShadow:"0 1px 8px rgba(0,0,0,0.07)"}}>
          <div style={{display:"flex",gap:4,marginBottom:18,padding:"3px",background:"#f2f2f2",borderRadius:8}}>
            {[{k:"send",l:"📤 Send"},{k:"request",l:"📥 Request"}].map(m=>(
              <button key={m.k} onClick={()=>setMode(m.k)} style={{flex:1,padding:"9px",borderRadius:6,border:"none",background:mode===m.k?"#fff":"transparent",color:mode===m.k?TEXT:"#888",fontWeight:700,fontSize:13,cursor:"pointer",boxShadow:mode===m.k?"0 1px 6px rgba(0,0,0,0.08)":"none"}}>{m.l}</button>
            ))}
          </div>
          <div style={{marginBottom:14}}>
            <div style={{fontSize:12,color:"#888",fontWeight:600,marginBottom:5}}>{mode==="send"?"Send To":"Request From"}</div>

              style={{width:"100%",padding:"12px 14px",borderRadius:8,border:"1px solid #ddd",fontSize:15,color:TEXT}}/>
          </div>
          <div style={{marginBottom:22}}>
            <div style={{fontSize:12,color:"#888",fontWeight:600,marginBottom:5}}>Amount (ETB)</div>
            <input value={amount} onChange={e=>setAmount(e.target.value)} type="number" placeholder="0.00"
              style={{width:"100%",padding:"12px 14px",borderRadius:8,border:"1px solid #ddd",fontSize:28,fontWeight:900,color:TEXT}}/>
          </div>
          <button onClick={handle} style={{width:"100%",padding:14,borderRadius:8,border:"none",background:loading?"#aaa":GREEN,color:"#fff",fontSize:16,fontWeight:500,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:10}}>
            {loading?<><Spinner/> Sending...</>:(mode==="send"?"Send Money 💸":"Send Request 📩")}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── BILL ──────────────────────────────────────────────
function BillScreen({onBack}){
  const [billType,setBillType]=useState("");
  const [amount,setAmount]=useState("");
  const [loading,setLoading]=useState(false);
  const bills=[{id:"electric",label:"Electricity",emoji:"⚡"},{id:"water",label:"Water",emoji:"💧"},{id:"internet",label:"Internet",emoji:"🌐"},{id:"tv",label:"Television",emoji:"📺"}];
  function pay(){
    if(!billType||!amount){alert("Please select bill and enter amount");return;}
    setLoading(true);setTimeout(()=>{setLoading(false);alert("✅ "+amount+" ETB paid!");onBack();},1500);
  }
  return(
    <div style={{minHeight:"100vh",background:GRAY,display:"flex",flexDirection:"column"}}>
      <div style={{background:GREEN,padding:"14px 16px",display:"flex",alignItems:"center",gap:12}}>
        <button onClick={onBack} style={{background:"rgba(255,255,255,0.2)",border:"none",borderRadius:"50%",width:36,height:36,color:"#fff",fontSize:20,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>←</button>
        <span style={{color:"#fff",fontSize:17,fontWeight:700}}>Pay Bills</span>
      </div>
      <div style={{padding:16,flex:1}}>
        <div style={{background:"#fff",borderRadius:12,padding:20,boxShadow:"0 1px 8px rgba(0,0,0,0.07)"}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:18}}>
            {bills.map(b=>(
              <div key={b.id} onClick={()=>setBillType(b.id)} style={{padding:"14px",borderRadius:10,border:billType===b.id?`2px solid ${GREEN}`:"1px solid #eee",textAlign:"center",cursor:"pointer",background:billType===b.id?"#e8f5e9":"#fff"}}>
                <div style={{fontSize:28}}>{b.emoji}</div>
                <div style={{fontSize:12,fontWeight:700,marginTop:5,color:TEXT}}>{b.label}</div>

            ))}

          <button onClick={pay} style={{width:"100%",padding:14,borderRadius:8,border:"none",background:loading?"#aaa":GREEN,color:"#fff",fontSize:16,fontWeight:500,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:10}}>
            {loading?<><Spinner/> Processing...</>:"Pay Now ✅"}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── QR CODE GENERATOR (real data matrix) ─────────────
function QRCode({data,size=120}){
  // Generate QR using a free API — real scannable QR
  const url="https://api.qrserver.com/v1/create-qr-code/?size="+size+"x"+size+"&data="+encodeURIComponent(data)+"&format=svg&ecc=M";
  return <img src={url} width={size} height={size} style={{borderRadius:6,border:"2px solid #eee"}}/>;
}

// ── SMS NOTIFICATION TOAST ────────────────────────────
function SmsToast({msg, onDismiss}){
  useEffect(()=>{
    const t=setTimeout(onDismiss, 6000);
    return()=>clearTimeout(t);
  },[]);
  return(
    <div style={{
      position:"fixed",top:0,left:"50%",transform:"translateX(-50%)",
      width:"100%",maxWidth:400,zIndex:99999,
      animation:"slideDown 0.3s ease",
    }}>
      <style>{`@keyframes slideDown{from{transform:translateX(-50%) translateY(-100%)}to{transform:translateX(-50%) translateY(0)}}`}</style>
      <div style={{background:"#1a1a1a",borderRadius:"0 0 16px 16px",padding:"12px 16px",margin:"0 8px",boxShadow:"0 8px 24px rgba(0,0,0,0.4)"}}>
        {/* top row */}
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
          <div style={{width:28,height:28,borderRadius:6,background:"#333",display:"flex",alignItems:"center",justifyContent:"center"}}>
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <rect x="1" y="3" width="14" height="10" rx="2" stroke="#aaa" strokeWidth="1.3"/>
              <path d="M1 6l7 4 7-4" stroke="#aaa" strokeWidth="1.3"/>
            </svg>
          </div>
          <div style={{flex:1}}>
            <span style={{color:"#fff",fontWeight:700,fontSize:13}}>Messaging</span>
            <span style={{color:"#888",fontSize:11}}> · now</span>
          </div>
          <span onClick={onDismiss} style={{color:"#888",fontSize:18,cursor:"pointer",lineHeight:1}}>×</span>
        </div>
        {/* number */}
        <div style={{color:"#fff",fontWeight:800,fontSize:15,marginBottom:3}}>127</div>
        {/* message */}
        <div style={{color:"#ccc",fontSize:12,lineHeight:1.5}}>{msg}</div>
        {/* actions */}
        <div style={{display:"flex",gap:20,marginTop:10}}>
          {["Mark as read","Delete","Reply"].map(a=>(
            <span key={a} style={{color:"#4fc3f7",fontWeight:600,fontSize:12,cursor:"pointer"}}>{a}</span>
          ))}
        </div>
      </div>
    </div>
  );
}

// ── PLAY SMS SOUND ─────────────────────────────────────
function playSmsSound(){
  try{
    const ctx=new (window.AudioContext||window.webkitAudioContext)();
    // Telebirr-style 3-note notification chime
    const seq=[
      {freq:1047, dur:0.12, start:0.0},   // C6
      {freq:1319, dur:0.12, start:0.14},  // E6
      {freq:1568, dur:0.22, start:0.28},  // G6 (longer)
    ];
    seq.forEach(({freq,dur,start})=>{
      const o=ctx.createOscillator();
      const g=ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type="sine";
      o.frequency.value=freq;
      const t=ctx.currentTime+start;
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(0.4,t+0.015);
      g.gain.exponentialRampToValueAtTime(0.001,t+dur);
      o.start(t); o.stop(t+dur+0.05);
    });
  }catch(e){}
}

// ── ROOT ──────────────────────────────────────────────
function App(){
  const [splash,setSplash]=useState(true);
  const [screen,setScreen]=useState("login");
  const [tx,setTx]=useState(null);
  const [txList,setTxList]=useState(MOCK_TX);
  const [balance,setBalance]=useState(637480.25);
  const [userPhone,setUserPhone]=useState("");
  const [bankForm,setBankForm]=useState(null); // {bank,acctNo,fullName}
  const [bankLoading,setBankLoading]=useState(false);
  const [toast,setToast]=useState(null);

  function showSmsToast(amount, to, newBal, ref){
    playSmsSound();
    const balStr=(newBal||0).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});
    const amtStr=parseFloat(amount).toFixed(2);
    const msg=`Dear customer, ETB ${amtStr} has been transferred to ${to}. Your new telebirr balance is ETB ${balStr}. TxRef: ${(ref||"").slice(0,10)}. Thank you for using telebirr!`;
    setToast(msg);
  }

  useEffect(()=>{setTimeout(()=>setSplash(false),2400);},[]);

  async function handleLogin(phone){
    setUserPhone(phone);
    // load balance from Supabase
    const bal=await getOrCreateWallet(phone);
    setBalance(bal);
    setScreen("home");
  }

  function handleSuccess(t){
    const d=new Date(),p=n=>String(n).padStart(2,"0");
    const dateStr=d.toLocaleString("en-US",{month:"short",day:"numeric"});
    const timeStr=p(d.getHours())+":"+p(d.getMinutes());
    setTxList(prev=>[{id:Date.now(),date:dateStr,time:timeStr,description:"Sent to "+t.to,amount:"-"+Number(t.amount).toLocaleString(),type:"debit",ref:t.ref},...prev]);
    if(t.newBalance!==undefined) setBalance(t.newBalance);
    setTx(t);setScreen("success");
  }

  async function handleSendMoney(t){
    const ref=txRef();
    const time=nowStr();
    const amt=parseFloat(t.amount);
    const newBal=await deductWallet(userPhone,amt);
    await saveTransaction({phone:userPhone,type:"debit",description:"Sent to "+t.to,amount:-amt,ref_no:ref,tx_time:time});
    setBalance(newBal);
    showSmsToast(amt, t.to, newBal, ref);
    handleSuccess({...t,ref,time,newBalance:newBal,type:"send"});
  }

  async function handleBankSend(amount){
    if(!bankForm)return;
    setBankLoading(true);
    const ref=txRef();
    const time=nowStr();
    const amt=parseFloat(amount);
    const newBal=await deductWallet(userPhone,amt);
    await saveTransaction({phone:userPhone,type:"debit",description:"Transfer to Bank: "+bankForm.bank.name,amount:-amt,to_name:bankForm.fullName,to_account:bankForm.acctNo,bank_name:bankForm.bank.name,ref_no:ref,tx_time:time});
    const d=new Date(),p=n=>String(n).padStart(2,"0");
    const dateStr=d.toLocaleString("en-US",{month:"short",day:"numeric"});
    const timeStr=p(d.getHours())+":"+p(d.getMinutes());
    setTxList(prev=>[{id:Date.now(),date:dateStr,time:timeStr,description:"Transfer to Bank: "+bankForm.bank.name,amount:"-"+amt.toLocaleString(),type:"debit",ref},...prev]);
    setBalance(newBal);
    setBankLoading(false);
    setBankForm(null);
    showSmsToast(amt, bankForm.fullName, newBal, ref);
    setTx({amount:amt,to:bankForm.fullName,accountNo:bankForm.acctNo,bankName:bankForm.bank.name,ref,time,type:"bank",newBalance:newBal});
    setScreen("success");
  }

  return(
    <div style={{maxWidth:400,minHeight:"100vh",margin:"0 auto",fontFamily:"'Roboto',sans-serif",background:GRAY,boxShadow:"0 0 40px rgba(0,0,0,0.2)",overflow:"hidden",position:"relative"}}>
      {splash&&<SplashScreen/>}
      {toast&&<SmsToast msg={toast} onDismiss={()=>setToast(null)}/>}
      {screen==="login"  &&<LoginScreen   onLogin={handleLogin}/>}
      {screen==="home"   &&<HomeScreen    balance={balance} transactions={txList} onSend={()=>setScreen("send")} onBill={()=>setScreen("bill")} onAccount={()=>setScreen("account")} onApps={()=>setScreen("apps")} onTxHistory={()=>setScreen("txhistory")} onNotif={()=>setScreen("notif")} onBankTransfer={()=>setScreen("banktransfer")}/>}
      {screen==="send"   &&<SendScreen    onBack={()=>setScreen("home")} onSuccess={handleSendMoney}/>}
      {screen==="success"&&<SuccessScreen tx={tx} onFinish={()=>setScreen("home")}/>}
      {screen==="bill"   &&<BillScreen    onBack={()=>setScreen("home")}/>}
      {screen==="account"&&<AccountScreen onBack={()=>setScreen("home")} onLogout={()=>setScreen("login")}/>}
      {screen==="apps"   &&<AppsScreen    onBack={()=>setScreen("home")}/> }
      {screen==="txhistory"&&<TxHistoryScreen transactions={txList} onBack={()=>setScreen("home")}/> }
      {screen==="notif"  &&<NotificationPage transactions={txList} onBack={()=>setScreen("home")}/> }
      {screen==="banktransfer"&&!bankForm&&<TransferBankScreen userPhone={userPhone} onBack={()=>setScreen("home")} onSuccess={(form)=>{setBankForm(form);setScreen("bankamount");}}/>}
      {screen==="bankamount"&&bankForm&&<TransferAmountScreen bank={bankForm.bank} acctNo={bankForm.acctNo} fullName={bankForm.fullName} loading={bankLoading} onBack={()=>setScreen("banktransfer")} onSend={handleBankSend}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
